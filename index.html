<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Hero preload se inyecta al inicio del head en postbuild -->

  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
  <!-- Favicon para navegadores modernos (sobreescribe los anteriores) -->
  <link rel="icon" type="image/png" sizes="192x192" href="/logo-1.png" />

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" sizes="57x57" href="/apple-icon-57x57.png" />
  <link rel="apple-touch-icon" sizes="60x60" href="/apple-icon-60x60.png" />
  <link rel="apple-touch-icon" sizes="72x72" href="/apple-icon-72x72.png" />
  <link rel="apple-touch-icon" sizes="76x76" href="/apple-icon-76x76.png" />
  <link rel="apple-touch-icon" sizes="114x114" href="/apple-icon-114x114.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="/apple-icon-120x120.png" />
  <link rel="apple-touch-icon" sizes="144x144" href="/apple-icon-144x144.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png" />

  <!-- Android / PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#EC613B" />

  <!-- Windows Tiles -->
  <meta name="msapplication-TileColor" content="#EC613B" />
  <meta name="msapplication-TileImage" content="/ms-icon-144x144.png" />
  <meta name="msapplication-config" content="/browserconfig.xml" />

  <!-- SEO Base -->
  <title>Consultoría en Cultura Organizacional y Liderazgo | Escala</title>
  <meta name="description"
    content="Instalamos una cultura que crea líderes autónomos, equipos con ownership real y cumplimiento de KPIs. Especialistas en metodologías para PYMES." />
  <meta name="keywords"
    content="consultoria de procesos, estandarizacion de procesos, consultoria empresas, empresa consultora, gestion de procesos, sistematizacion de negocios, sistematizacion de procesos, consultoras de procesos, consultor de procesos, implementacion de procesos, consultoria empresarial, consultoria proceso, asesoramiento en estructuras organizacionales, empresas consultora, asesoria procesos, servicios consultoria, consultoria en procesos, reingeniería organizacional, procesos empresariales, estructura empresa, consultoría de procesos desarrollo organizacional, reingenieria de procesos" />

  <!-- Open Graph / Redes Sociales -->
  <meta property="og:title" content="Consultoría en Cultura Organizacional y Liderazgo | Escala" />
  <meta property="og:description"
    content="Instalamos una cultura que crea líderes autónomos, equipos con ownership real y cumplimiento de KPIs. Especialistas en metodologías para PYMES." />
  <meta property="og:image" content="https://landing-scala.rossdigital.dev/logo.webp" />
  <meta property="og:url" content="https://landing-scala.rossdigital.dev" />
  <meta property="og:type" content="website" />

  <!-- Critical CSS: evita FOUC del h1 cuando el bundle de estilos carga después -->
  <style>
    #root h1 {
      font-family: "Bebas Neue", sans-serif;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #111827;
      line-height: 1.1;
      text-shadow: 2px 2px 0 #d1d5db;
    }
    #root h1 span {
      color: #ec613b;
    }
  </style>
  <!-- Preconnect solo para orígenes de la ruta crítica; formsubmit.co se preconecta al montar el formulario -->
  <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />
</head>

<body>
  <!-- Captura errores de carga/ejecución para diagnosticar pantalla en blanco (p. ej. Safari) -->
  <script>
    window.__pageError = null;
    window.onerror = function(msg, url, line, col, err) {
      window.__pageError = msg + (err && err.stack ? "\n" + err.stack : "");
      var r = document.getElementById("root");
      if (r) r.innerHTML = "<div style=\"padding:2rem;font-family:monospace;white-space:pre-wrap;color:#c00;max-width:600px;margin:0 auto;font-size:14px\">Error: " + (msg || "") + (err && err.stack ? "\n\n" + err.stack : "") + "</div>";
    };
    window.addEventListener("unhandledrejection", function(e) {
      window.__pageError = e.reason;
      var r = document.getElementById("root");
      if (r) r.innerHTML = "<div style=\"padding:2rem;font-family:monospace;white-space:pre-wrap;color:#c00;max-width:600px;margin:0 auto\">Unhandled: " + String(e.reason) + "</div>";
    });
  </script>
  <!-- Hero visible en HTML: LCP se pinta sin esperar al JS (mejora LCP y Speed Index). React reemplaza #root al montar. -->
  <div id="root" style="padding-top: 7rem; min-height: 100vh; background: #fff;">
    <picture>
      <source media="(max-width: 768px)" srcset="./hero-mobile.webp" type="image/webp" />
      <source media="(min-width: 769px)" srcset="./hero-desktop.webp" type="image/webp" />
      <source media="(max-width: 768px)" srcset="./hero-mobile.jpg" type="image/jpeg" />
      <source media="(min-width: 769px)" srcset="./hero-desktop.jpg" type="image/jpeg" />
      <img
        src="./hero-desktop.jpg"
        alt="Cultura Organizacional Escala"
        width="650"
        height="650"
        fetchpriority="high"
        loading="eager"
        decoding="async"
        style="width:100%;max-width:650px;height:auto;aspect-ratio:1/1;object-fit:cover;display:block;margin:0 auto;border-radius:40px;box-shadow:0 10px 20px rgba(0,0,0,0.08)"
      />
    </picture>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
